# Local Development Configuration
# H2 Database Settings (for local development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Settings for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable MySQL specific settings for local
spring.jpa.properties.hibernate.dialect.storage_engine=

# Local-only secrets — 운영 환경에서는 절대 사용하지 말 것 (운영은 환경변수로 주입)
# JWT 서명(HS512)은 512비트(64바이트) 이상 키가 필요하다.
app.jwtSecret=local-development-only-jwt-signing-secret-do-not-use-in-production-0123456789
app.encryption.secret-key=local-development-only-encryption-key-do-not-use-in-prod
app.encryption.salt=local-development-only-salt