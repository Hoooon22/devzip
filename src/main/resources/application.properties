spring.application.name=devzip

# JPA 비활성화
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# X-Forwarded-For
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto
server.tomcat.internal-proxies=10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|20\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|169\\.254\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|172\\.1[6-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.2[0-9]{1}\\.\\d{1,3}\\.\\d{1,3}|172\\.3[0-1]{1}\\.\\d{1,3}\\.\\d{1,3}|0:0:0:0:0:0:0:1|::1
server.use-forward-headers=true

# 로그 레벨 (운영 기본 INFO, 필요 시 환경변수로 DEBUG 전환)
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.hoooon22.devzip=${LOG_LEVEL_APP:INFO}

# Error Page (보안: 예외 메시지/스택을 클라이언트에 노출하지 않음. GlobalExceptionHandler가 안전한 응답을 반환)
server.error.include-message=${ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${ERROR_INCLUDE_BINDING_ERRORS:never}
server.error.include-stacktrace=never
server.error.include-exception=false

# DB - Profile based configuration
spring.profiles.include=${SPRING_PROFILES_ACTIVE:local}

# Hibernate DDL 전략 (운영 기본값 update: 신규 엔티티 테이블 자동 생성, 기존 테이블은 보존)
# 로컬 프로파일은 application-local.properties 에서 create-drop 으로 재정의됨
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# # Logging for SQL (개발환경에서만 활성화)
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Hibernate 성능 최적화 설정
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=20
spring.jpa.properties.hibernate.connection.pool_size=10
spring.jpa.properties.hibernate.c3p0.min_size=5
spring.jpa.properties.hibernate.c3p0.max_size=20
spring.jpa.properties.hibernate.c3p0.timeout=300
spring.jpa.properties.hibernate.c3p0.max_statements=50
spring.jpa.properties.hibernate.c3p0.idle_test_period=3000

# 쿼리 계획 캐시 설정
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128

# 2차 캐시 비활성화 (Redis 별도 사용 예정)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# SpringBoot Actuator
# 보안: 모든 엔드포인트(env/heapdump/threaddump/loggers 등) 노출 금지.
# 운영에 필요한 health, info, metrics 만 노출한다(metrics 는 대시보드가 사용, /actuator/** 는 ADMIN 전용).
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,metrics}
# 보안: 익명 사용자에게 health 상세(DB/디스크 등)를 노출하지 않는다. 인증된 경우에만 상세 표시.
management.endpoint.health.show-details=${HEALTH_SHOW_DETAILS:when-authorized}
management.endpoint.metrics.enabled=true
management.metrics.distribution.percentiles-histogram.cpu.usage=true

# # Build 최적화
org.gradle.daemon=true
# org.gradle.caching=true
# org.gradle.parallel=true
# org.gradle.configureondemand=true

# springboot security
spring.security.enabled=true

# 세션 쿠키 보안 플래그 (인증은 stateless JWT 헤더 기반이라 세션 쿠키를 JS에서 읽을 필요가 없음)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

network.interface=enX0

# pixel-roguelike
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/

# TraceBoard - SPA 라우팅을 위한 설정
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# server open
server.port=8080
server.address=0.0.0.0

# Security Settings
# 비밀키는 기본값을 두지 않는다. 환경변수가 없으면 애플리케이션이 기동을 거부한다(fail-fast).
# 로컬 개발용 기본값은 application-local.properties 에만 존재한다.
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationInMs=${JWT_EXPIRATION:86400000}

# Data Encryption Settings
app.encryption.secret-key=${ENCRYPTION_SECRET}
app.encryption.salt=${ENCRYPTION_SALT}

# Google AI Studio API Settings (Gemini)
# https://aistudio.google.com/app/apikey 에서 API 키 발급
google.api.key=${GOOGLE_API_KEY:}

# CORS Settings
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080,http://localhost:3000,https://192.168.75.224,http://192.168.75.224,http://192.168.75.224:8080,https://devzip.cloud,http://devzip.cloud,https://www.devzip.cloud,http://www.devzip.cloud}
app.cors.max-age=${CORS_MAX_AGE:3600}

# WebSocket Settings
app.websocket.allowed-origins=${WEBSOCKET_ORIGINS:http://localhost:8080,http://localhost:3000}

# Pagination Settings (메모리 보호를 위한 최대 조회 제한)
app.pagination.default-limit=${PAGINATION_DEFAULT:1000}
app.pagination.dashboard-limit=${PAGINATION_DASHBOARD:50000}
app.pagination.export-limit=${PAGINATION_EXPORT:100000}
app.pagination.user-limit=${PAGINATION_USER:2000}
app.pagination.type-limit=${PAGINATION_TYPE:5000}

# Webhook Settings - Entry(Guestbook) Events
# 웹훅을 활성화하려면 webhook.entry.enabled=true로 설정하고,
# webhook.entry.url에 웹훅을 수신할 URL을 입력하세요
webhook.entry.enabled=${WEBHOOK_ENTRY_ENABLED:false}
webhook.entry.url=${WEBHOOK_ENTRY_URL:http://localhost:8080/api/webhook/test}

# Webhook Settings - Conflux Integration
# GitHub Actions 결과를 Conflux로 전송
# ngrok URL: https://lushiest-discordantly-lacey.ngrok-free.dev
webhook.conflux.enabled=${WEBHOOK_CONFLUX_ENABLED:true}
webhook.conflux.url=${WEBHOOK_CONFLUX_URL:https://lushiest-discordantly-lacey.ngrok-free.dev/api/webhook/custom}
