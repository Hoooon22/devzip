# devzip nginx 설정 (서버 적용 경로: /etc/nginx/sites-available/default)
# 적용 방법 (서버에서):
#   cd /home/ubuntu/project/devzip && git pull origin master
#   sudo cp nginx/devzip.conf /etc/nginx/sites-available/default
#   sudo nginx -t && sudo systemctl reload nginx

# 80 → https 리다이렉트 + ACME
server {
    listen 80;
    listen [::]:80;
    server_name devzip.site www.devzip.site devzip.cloud www.devzip.cloud;

    # Let's Encrypt http-01
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 443 프록시 (devzip.site)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devzip.site www.devzip.site;
    ssl_certificate /etc/letsencrypt/live/devzip.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devzip.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /var/www/html;
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# 443 구 도메인 → 새 도메인 301 (devzip.cloud 해지 시 아래 두 블록 삭제)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devzip.cloud;
    ssl_certificate /etc/letsencrypt/live/devzip.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devzip.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://devzip.site$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.devzip.cloud;
    ssl_certificate /etc/letsencrypt/live/www.devzip.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.devzip.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://devzip.site$request_uri;
}
