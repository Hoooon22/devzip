name: DevZip CI/CD Pipeline (Optimized)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'  # package.json과 일치

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      deployments: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/main/frontend/package-lock.json

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 프론트엔드 node_modules 캐시: installFrontendReact가 매 빌드 npm install을
    # 전체 실행하므로, lock 파일 기준으로 node_modules를 캐시해 설치 시간을 단축한다.
    - name: Cache frontend node_modules
      uses: actions/cache@v4
      with:
        path: src/main/frontend/node_modules
        key: ${{ runner.os }}-frontend-modules-${{ hashFiles('src/main/frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-frontend-modules-

    - name: Build Application
      env:
        CI: false
        GENERATE_SOURCEMAP: false
      run: |
        chmod +x gradlew
        ./gradlew build -x test

        # JAR 파일 확인
        ls -lh build/libs/
        echo "✅ Build completed"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      env:
        GHCR_USER: ${{ github.repository_owner }}
        GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # ghcr.io 일시적 타임아웃(context deadline exceeded) 대비 재시도
        for i in 1 2 3; do
          echo "${GHCR_PASS}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin && exit 0
          echo "⏳ GHCR login failed (attempt $i/3), retrying in 10s..."
          sleep 10
        done
        echo "❌ GHCR login failed after 3 attempts"
        exit 1

    - name: Build and Push Docker image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
        IMAGE_REPO="ghcr.io/${OWNER_LC}/devzip"
        docker buildx build \
          --platform linux/amd64 \
          -t "${IMAGE_REPO}:${IMAGE_TAG}" \
          -t "${IMAGE_REPO}:latest" \
          --push .
        echo "IMAGE_REPO=${IMAGE_REPO}" >> $GITHUB_ENV
        echo "IMAGE_FULL=${IMAGE_REPO}:${IMAGE_TAG}" >> $GITHUB_ENV
        echo "✅ Image pushed: ${IMAGE_REPO}:${IMAGE_TAG}"

    - name: Build & Deploy on Production Server
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_SHA: ${{ github.sha }}
        # 비밀키는 리포에 두지 않고 GitHub Secrets로 주입한다(서버 .env 미설정 대비).
        ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
        ENCRYPTION_SALT: ${{ secrets.ENCRYPTION_SALT }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: ${{ secrets.SERVER_SSH_PORT }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # 서버 SSH 연결이 간헐적으로 느려 60s에서 dial tcp i/o timeout이 발생 -> 여유 확보
        timeout: 180s
        command_timeout: 10m
        envs: GHCR_TOKEN,GITHUB_REPOSITORY_OWNER,GITHUB_SHA,ENCRYPTION_SECRET,ENCRYPTION_SALT
        script: |
          cd /home/ubuntu/project/devzip
          echo "🚀 Starting deployment (pulling prebuilt image)..."

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="ghcr.io/${OWNER_LC}/devzip"
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_FULL="${IMAGE_REPO}:${IMAGE_TAG}"

          # Git 저장소 최신화
          echo "📥 Updating git repository..."
          git config pull.rebase false
          git pull origin master
          echo "✅ Git repository updated"

          # 점검 페이지(maintenance.html)를 nginx 서빙 경로로 동기화
          # nginx는 백엔드 502/503/504 시 /var/www/html/maintenance.html을 서빙한다.
          echo "📄 Syncing maintenance page to nginx..."
          if sudo cp maintenance.html /var/www/html/maintenance.html; then
            echo "✅ maintenance.html updated"
          else
            echo "⚠️ maintenance.html sync failed (non-blocking)"
          fi

          # 컨테이너 레지스트리 로그인 (GHCR)
          echo "🔑 Logging into GHCR..."
          echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GITHUB_REPOSITORY_OWNER}" --password-stdin

          # 최신 이미지 풀 및 컨테이너 교체
          echo "🐳 Pulling image ${IMAGE_FULL}..."
          APP_IMAGE="${IMAGE_FULL}" sudo -E docker compose pull app

          echo "🚀 Recreating containers with new image..."
          # ENCRYPTION_SECRET/SALT 를 compose 로 전달(서버 .env 에 없을 때 대비).
          APP_IMAGE="${IMAGE_FULL}" \
            ENCRYPTION_SECRET="${ENCRYPTION_SECRET}" \
            ENCRYPTION_SALT="${ENCRYPTION_SALT}" \
            sudo -E docker compose up -d --force-recreate app

          echo "⏳ Waiting briefly for application to start..."
          sleep 5

          # 헬스체크 (배포 SSH 세션 내에서 권위 검증).
          # 러너->서버 SSH는 간헐적으로 끊기므로, 이미 연결된 이 세션에서 직접 검증해
          # 두 번째 SSH 연결에 파이프라인 성패를 의존하지 않게 한다. 실패 시 job 실패 처리.
          for i in $(seq 1 20); do
            if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ Application started successfully!"
              exit 0
            fi
            echo "⏳ Waiting for app health... ($i/20)"
            sleep 6
          done

          echo "❌ Application failed health check after deployment"
          exit 1

    - name: Send Build Failure Webhook
      if: failure()
      run: |
        curl -k -X POST https://devzip.site/api/webhook/github-actions \
          -H "Content-Type: application/json" \
          -d '{
            "workflow_name": "${{ github.workflow }}",
            "status": "failure",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "author": "${{ github.actor }}",
            "run_number": "${{ github.run_number }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "failed_job": "build-and-deploy",
            "failure_reason": "Build or deployment failed",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S)'",
            "environment": "production"
          }' || echo "⚠️ Webhook notification failed (non-blocking)"

  health-check:
    name: Health Check & Verification
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-health-check]')

    steps:
    - name: Wait for Application Startup
      run: |
        # 배포 job의 SSH 단계에서 이미 헬스체크를 통과하므로 긴 고정 대기는 불필요하다.
        # 아래 "Health Check - Server Local" 단계가 10회×6s 폴링으로 안전망 역할을 한다.
        echo "⏳ Brief grace period before health verification..."
        sleep 5

    # 권위 헬스체크는 배포 job의 SSH 세션 안에서 이미 수행한다.
    # 이 단계는 러너->서버로의 두 번째 SSH 연결이라 간헐적으로 끊겨(false negative)
    # 파이프라인을 망가뜨리므로 비차단(continue-on-error)으로 둔다.
    - name: Health Check - Server Local (informational)
      continue-on-error: true
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: ${{ secrets.SERVER_SSH_PORT }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # 서버 SSH 연결이 간헐적으로 느려 60s에서 dial tcp i/o timeout이 발생 -> 여유 확보
        timeout: 180s
        command_timeout: 2m
        script: |
          echo "🏥 Checking app health from server..."
          max_retries=10
          wait_time=6
          for i in $(seq 1 $max_retries); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Local health check passed (attempt ${i}/${max_retries})"
              exit 0
            fi
            echo "⏳ Local health check failed (HTTP $status), retrying in ${wait_time}s... (attempt ${i}/${max_retries})"
            sleep $wait_time
          done
          echo "❌ Local health check failed after $max_retries attempts"
          exit 1

    - name: Health Check - External (informational)
      run: |
        echo "🌐 Running external health check (non-blocking, informational)..."
        response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://devzip.site/actuator/health || echo "000")
        echo "ℹ️  External status: $response"
        if [ "$response" != "200" ]; then
          echo "⚠️ External check did not return 200. This may be due to firewall or DNS restrictions from GitHub runners."
        else
          echo "✅ External endpoint reachable."
        fi

    - name: Authentication System Check
      run: |
        echo "🔐 Testing JWT authentication system..."

        login_response=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://devzip.site/api/auth/signin \
          -H "Content-Type: application/json" \
          -d '{"username":"test","password":"test"}' || echo "000")

        if [ "$login_response" = "403" ] || [ "$login_response" = "401" ] || [ "$login_response" = "400" ]; then
          echo "✅ Authentication endpoint: Responding properly"
        elif [ "$login_response" = "404" ]; then
          echo "❌ Authentication endpoint: Not found"
        else
          echo "⚠️ Authentication endpoint: Unexpected response ($login_response)"
        fi

    - name: Frontend Loading Check
      run: |
        echo "🌐 Testing frontend loading..."

        main_response=$(curl -s -o /dev/null -w "%{http_code}" https://devzip.site/ || echo "000")

        if [ "$main_response" = "200" ]; then
          echo "✅ Main page: Loading successfully"
        else
          echo "❌ Main page: Failed to load (HTTP $main_response)"
        fi

    - name: Protected Routes Check
      run: |
        echo "🛡️ Testing protected routes..."

        dashboard_response=$(curl -s -o /dev/null -w "%{http_code}" https://devzip.site/dashboard || echo "000")
        traceboard_response=$(curl -s -o /dev/null -w "%{http_code}" https://devzip.site/traceboard || echo "000")

        if [ "$dashboard_response" = "200" ] || [ "$dashboard_response" = "302" ] || [ "$dashboard_response" = "401" ]; then
          echo "✅ Dashboard protection: Working"
        else
          echo "⚠️ Dashboard protection: Unexpected response ($dashboard_response)"
        fi

        if [ "$traceboard_response" = "200" ] || [ "$traceboard_response" = "302" ] || [ "$traceboard_response" = "401" ]; then
          echo "✅ Traceboard protection: Working"
        else
          echo "⚠️ Traceboard protection: Unexpected response ($traceboard_response)"
        fi

    - name: Final Status Report
      run: |
        echo ""
        echo "📊 Deployment Status Summary:"
        echo "=========================================="
        echo "🎯 Application: DevZip"
        echo "🌐 URL: https://devzip.site"
        echo "🔐 Authentication: JWT-based admin system"
        echo "🛡️ Protected Routes: Dashboard, Traceboard"
        echo "⚡ Features: Real-time analytics, User tracking"
        echo ""
        echo "✅ Deployment completed successfully!"
        echo "🚀 All systems operational and ready for use!"

    - name: Send Success Webhook
      if: success()
      run: |
        curl -k -X POST https://devzip.site/api/webhook/github-actions \
          -H "Content-Type: application/json" \
          -d '{
            "workflow_name": "${{ github.workflow }}",
            "status": "success",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "author": "${{ github.actor }}",
            "run_number": "${{ github.run_number }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S)'",
            "environment": "production"
          }' || echo "⚠️ Webhook notification failed (non-blocking)"

    - name: Send Failure Webhook
      if: failure()
      run: |
        curl -k -X POST https://devzip.site/api/webhook/github-actions \
          -H "Content-Type: application/json" \
          -d '{
            "workflow_name": "${{ github.workflow }}",
            "status": "failure",
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "author": "${{ github.actor }}",
            "run_number": "${{ github.run_number }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "failed_job": "${{ github.job }}",
            "failure_reason": "Health check or deployment verification failed",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%S)'",
            "environment": "production"
          }' || echo "⚠️ Webhook notification failed (non-blocking)"
