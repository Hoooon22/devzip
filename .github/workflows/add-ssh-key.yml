name: Add Personal SSH Key (one-off)

# 개인 PC에서 서버 SSH 접속이 안 될 때, 배포용 SSH 자격증명(Secrets)을 재사용해
# 새 공개키를 서버 authorized_keys에 등록하는 일회성 워크플로.
# Actions 탭에서 수동 실행(workflow_dispatch)만 가능. 등록 확인 후 이 파일은 삭제할 것.

on:
  workflow_dispatch:

jobs:
  add-key:
    name: Append public key to authorized_keys
    runs-on: ubuntu-latest
    steps:
    - name: Add public key on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        port: ${{ secrets.SERVER_SSH_PORT }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        timeout: 180s
        command_timeout: 2m
        script: |
          PUBKEY='ssh-rsa  ssh-key-2026-07-13'
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          if grep -qF "$PUBKEY" ~/.ssh/authorized_keys; then
            echo "already registered - nothing to do"
          else
            echo "$PUBKEY" >> ~/.ssh/authorized_keys
            echo "public key appended"
          fi
          echo "ssh username for this server: $(whoami)"
          echo "authorized_keys entries: $(wc -l < ~/.ssh/authorized_keys)"
